spring.application.name=kite

# Same port the Cloudflare Tunnel (~/.cloudflared/config.yml) already points at.
server.port=8000

kite.api-key=${KITE_API_KEY}
kite.api-secret=${KITE_API_SECRET}

spring.datasource.url=jdbc:postgresql://localhost:5432/kite
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# Auto-creates/updates tables from the entities below. Fine for a WIP project;
# swap for Flyway/Liquibase migrations before this has real users' data in it.
spring.jpa.hibernate.ddl-auto=update

# Used for CORS (WebConfig) and where /callback redirects after a successful Kite login.
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
